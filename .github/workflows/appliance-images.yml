# Build + publish the LAN-appliance container images to GitHub Container Registry (GHCR) so families can run
# the appliance with a PULL (seconds) instead of a local source build (minutes). Runs on every push to the
# default branch, on version tags, and on demand. The images:
#   ghcr.io/<owner>/fam-hub-web    (React + Express; serves :4894)
#   ghcr.io/<owner>/fam-hub-agent  (Python ADK concierge + the Node MCP child)
# After the first run, set both packages to PUBLIC in your GitHub → Packages settings so anyone can pull them
# (GHCR packages default to private). The install script + docker-compose.appliance.prebuilt.yml pull `:latest`.
name: appliance-images

on:
  push:
    branches: [initial-push, main, master]   # build on the default branch (and a fork's master)
    tags: ['v*']
  pull_request:                              # run the test gate on PRs too (no image push — see the build job)
    branches: [initial-push, main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # [4] Gate the published images on the full suite — never push an image that fails CI.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # Python concierge agent: the offline (keyless) pytest layer — structure smoke + the no-payment /
  # prompt-injection safety proofs. The `live` (Gemini-key) prompts are skipped here via -m "not live".
  test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r agent/requirements.txt
      - run: cd agent && python -m pytest -m "not live" -q

  build:
    needs: [test, test-agent]
    if: github.event_name != 'pull_request'   # test on PRs, but only publish images on push/tag/dispatch
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web
            dockerfile: Dockerfile.web
          - name: agent
            dockerfile: Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3      # [9] arm64 emulation so the Raspberry Pi 4/5 (arm64) images build

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fam-hub-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64   # [9] amd64 boxes + Raspberry Pi 4/5 (arm64), matching INSTALL.md
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Only the web image reads this (the agent Dockerfile ignores it); enables the concierge panel.
          build-args: |
            VITE_AGENT_BASE_URL=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
